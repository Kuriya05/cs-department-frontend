services:
  # 1. Database: MongoDB
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 2. Backend API
  backend:
    build: .
    container_name: backend_container
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/mydatabase
      - PORT=3001
    depends_on:
      - mongodb

  # 3. Frontend UI (ai-cs-department)
  frontend:
    build:
      context: ../../ai-cs-department/ai-cs-department
      dockerfile: Dockerfile
    container_name: frontend_container
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo_data: